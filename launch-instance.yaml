---
- name: Launch AWS GPU instance (tries us-east-2 first, then other US regions)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    instance_type: g6.12xlarge # 1 V100 GPU or g6.4xlarge 1 L4 GPU
    
    # Regions to try in order (us-east-2 first, then others)
    regions_to_try:
      - us-east-2
      - us-east-1
      - us-west-2
      - us-west-1
    
    # Common configuration (same across regions where possible)
    key_pair: router-team-us-east2  # Use your existing working key
    
    # Region-specific configurations (only what must be different)
    region_configs:
      us-east-1:
        ami_id: ami-0e2c8caa4b6378d8c  # Ubuntu 22.04 with NVIDIA GPU driver
      us-east-2:
        ami_id: ami-00f71ac70c2d6344d  # Ubuntu 22.04 with NVIDIA GPU driver
      us-west-1:
        ami_id: ami-0d53d72369335a9d6  # Ubuntu 22.04 with NVIDIA GPU driver
      us-west-2:
        ami_id: ami-05134c8ef96964280  # Ubuntu 22.04 with NVIDIA GPU driver
    root_volume_size: 500  # GB
    instance_name: "{{ ansible_hostname }}-{{ ansible_date_time.epoch }}"
    
  tasks:
    - name: Ensure boto3 and botocore are installed
      pip:
        name:
          - boto3
          - botocore
        state: present
      delegate_to: localhost

    - name: Initialize launch success flag
      set_fact:
        launch_successful: false
        
    - name: Check if public key file exists
      stat:
        path: "~/.ssh/{{ key_pair }}.pub"
      register: pub_key_file
      delegate_to: localhost

    - name: Display key file status
      debug:
        msg: "Public key file {{ '~/.ssh/' + key_pair + '.pub' }} {{ 'exists' if pub_key_file.stat.exists else 'does not exist' }}"

    - name: Ensure key pair exists in each region
      amazon.aws.ec2_key:
        region: "{{ item }}"
        name: "{{ key_pair }}"
        key_material: "{{ lookup('file', '~/.ssh/' + key_pair + '.pub') }}"
        state: present
      register: key_pairs
      loop: "{{ regions_to_try }}"
      when: 
        - not launch_successful
        - pub_key_file.stat.exists
        
    - name: Find or create security group for each region
      amazon.aws.ec2_security_group:
        region: "{{ item }}"
        name: k8s-gpu-sg
        description: Security group for Kubernetes GPU instances
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: SSH
          - proto: tcp
            ports:
              - 6443
            cidr_ip: 0.0.0.0/0
            rule_desc: Kubernetes API server
          - proto: tcp
            ports:
              - 10250
            cidr_ip: 0.0.0.0/0
            rule_desc: Kubelet API
          - proto: tcp
            ports:
              - 30000-32767
            cidr_ip: 0.0.0.0/0
            rule_desc: NodePort Services
        tags:
          Name: k8s-gpu-security-group
          Environment: production
      register: security_groups
      ignore_errors: yes
      loop: "{{ regions_to_try }}"
      when: not launch_successful

    - name: Try launching instance in each region until success
      amazon.aws.ec2_instance:
        region: "{{ item }}"
        availability_zone: "{{ item }}b"
        name: "{{ instance_name }}"
        image_id: "{{ region_configs[item].ami_id }}"
        instance_type: "{{ instance_type }}"
        key_name: "{{ key_pair }}"
        security_groups:
          - k8s-gpu-sg
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_type: gp3
              volume_size: "{{ root_volume_size }}"
              delete_on_termination: true
              encrypted: true
        state: running
        wait: true
        wait_timeout: 600
        tags:
          Name: "{{ instance_name }}"
          Environment: production
          InstanceType: "{{ instance_type }}"
          AMI: "{{ region_configs[item].ami_id }}"
          CreatedBy: ansible
          CreatedAt: "{{ ansible_date_time.iso8601 }}"
          Region: "{{ item }}"
      register: ec2_launch_results
      ignore_errors: yes
      loop: "{{ regions_to_try }}"
      when: not launch_successful
      
    - name: Set successful instance from results
      set_fact:
        ec2_instance: "{{ item }}"
        aws_region: "{{ item.item }}"
        ami_id: "{{ region_configs[item.item].ami_id }}"
        launch_successful: true
      loop: "{{ ec2_launch_results.results }}"
      when: 
        - not launch_successful
        - not item.failed
        - item.instances is defined
        - item.instances | length > 0
        
    - name: Display successful launch information
      debug:
        msg:
          - "Successfully launched instance in region: {{ aws_region }}"
          - "Instance ID: {{ ec2_instance.instances[0].instance_id }}"
          - "AMI ID: {{ ami_id }}"
          - "Key pair: {{ key_pair }}"
          - "Security group: k8s-gpu-sg"
      when: launch_successful
      
    - name: Display failed regions
      debug:
        msg: "Failed to launch in region: {{ item.item }} - {{ item.msg | default('Unknown error') }}"
      loop: "{{ ec2_launch_results.results | default([]) }}"
      when: 
        - item.failed or (item.instances is not defined or item.instances | length == 0)
        
    - name: Fail if all regions failed
      fail:
        msg: "Failed to launch instance in all attempted regions: {{ regions_to_try | join(', ') }}"
      when: not launch_successful

    - name: Display instance information
      debug:
        msg:
          - "Instance launched successfully!"
          - "Instance ID: {{ ec2_instance.instances[0].instance_id }}"
          - "Instance Type: {{ ec2_instance.instances[0].instance_type }}"
          - "Public IP: {{ ec2_instance.instances[0].public_ip_address | default('N/A') }}"
          - "Private IP: {{ ec2_instance.instances[0].private_ip_address }}"
          - "State: {{ ec2_instance.instances[0].state.name }}"
          - "Launch Time: {{ ec2_instance.instances[0].launch_time }}"

    - name: Wait for SSH to become available
      wait_for:
        host: "{{ ec2_instance.instances[0].public_ip_address }}"
        port: 22
        delay: 60
        timeout: 300
        state: started
      when: ec2_instance.instances[0].public_ip_address is defined

    - name: Add instance to inventory
      add_host:
        hostname: "{{ ec2_instance.instances[0].public_ip_address | default(ec2_instance.instances[0].private_ip_address) }}"
        groupname: gpu_instances
        ansible_user: ubuntu
        ansible_ssh_private_key_file: "~/.ssh/{{ key_pair }}.pem"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        instance_id: "{{ ec2_instance.instances[0].instance_id }}"
      when: ec2_instance.instances[0] is defined

    - name: Save instance details to file
      copy:
        content: |
          Instance Details:
          =================
          Instance ID: {{ ec2_instance.instances[0].instance_id }}
          Instance Name: {{ instance_name }}
          Instance Type: {{ ec2_instance.instances[0].instance_type }}
          AMI ID: {{ ec2_instance.instances[0].image_id }}
          Region: {{ aws_region }}
          Public IP: {{ ec2_instance.instances[0].public_ip_address | default('N/A') }}
          Private IP: {{ ec2_instance.instances[0].private_ip_address }}
          Key Pair: {{ key_pair }}
          Security Group: k8s-gpu-sg
          Root Volume Size: {{ root_volume_size }}GB
          Launch Time: {{ ec2_instance.instances[0].launch_time }}
          
          SSH Command:
          ssh -i ~/.ssh/{{ key_pair }}.pem ubuntu@{{ ec2_instance.instances[0].public_ip_address | default(ec2_instance.instances[0].private_ip_address) }}
        dest: "./instance-{{ ec2_instance.instances[0].instance_id }}-details.txt"
      delegate_to: localhost

    - name: Generate inventory file for GPU instance
      copy:
        content: |
          [gpu_instances]
          {{ instance_name.lower().replace(' ', '-') }} ansible_host={{ ec2_instance.instances[0].public_ip_address | default(ec2_instance.instances[0].private_ip_address) }} ansible_user=ubuntu

          [all:vars]
          ansible_ssh_private_key_file=~/.ssh/{{ key_pair }}.pem
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          ansible_become=yes
          ansible_become_method=sudo
        dest: "./gpu-inventory-{{ ec2_instance.instances[0].instance_id }}.ini"
      delegate_to: localhost


- name: Post-launch configuration
  hosts: gpu_instances
  become: yes
  gather_facts: yes
  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"

    - name: Install packages for debugging
      apt:
        name:
          - htop
          - vim
          - curl
          - wget
          - git
          - python3-pip
        state: present
      when: ansible_os_family == "Debian"

    - name: Check NVIDIA driver installation
      command: nvidia-smi
      register: nvidia_smi_output
      ignore_errors: yes

    - name: Display NVIDIA driver status
      debug:
        msg: |
          NVIDIA Driver Status:
          {{ nvidia_smi_output.stdout if nvidia_smi_output.rc == 0 else 'NVIDIA driver not found or not working properly' }}

    - name: Check GPU availability
      shell: lspci | grep -i nvidia
      register: gpu_check
      ignore_errors: yes

    - name: Display GPU information
      debug:
        msg: "GPU Information: {{ gpu_check.stdout if gpu_check.rc == 0 else 'No NVIDIA GPU detected' }}" 
